<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>LocatorLens</title>
  <style>
    /* 🛸 Lumina Cyber HUD Masterpiece Edition 🛸 */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

    :root {
      --bg: #070d1f;
      --surf: #11192e;
      --surf2: #1c253e;
      --surf-low: #0c1326;
      --border: rgba(65, 71, 91, 0.4);
      --primary: #3adffa;
      --primary-dim: rgba(58, 223, 250, 0.4);
      --secondary: #dae2fd;
      --tertiary: #47c4ff;
      --text: #dfe4fe;
      --muted: #a5aac2;
      --error: #ff716c;
      --warn: #fb923c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
      position: relative;
    }

    /* ── The Scanline Overlay ── */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
      z-index: 1000;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      opacity: 0.12;
    }

    /* ── Header ── */
    .header {
      background: var(--surf);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 0.5px solid var(--border);
    }

    .logo {
      font-size: 18px;
      flex-shrink: 0;
    }

    .brand {
      flex: 1;
    }

    .brand-name {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.02em;
    }

    .brand-sub {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 1px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: all .3s;
    }

    .status-dot.active {
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
      animation: pulse 2s infinite linear;
    }

    @keyframes pulse {
      0% { opacity: 1; box-shadow: 0 0 6px var(--primary); }
      50% { opacity: 0.7; box-shadow: 0 0 14px var(--primary); }
      100% { opacity: 1; box-shadow: 0 0 6px var(--primary); }
    }

    .logo {
      font-size: 20px;
      animation: glitchGlow 4s infinite linear;
      text-shadow: 0 0 5px var(--primary);
    }

    @keyframes glitchGlow {
      0%, 100% { opacity: 1; filter: hue-rotate(0deg); text-shadow: 0 0 5px var(--primary); }
      92% { opacity: 1; filter: hue-rotate(0deg); }
      94% { opacity: 0.8; filter: hue-rotate(90deg); text-shadow: 2px 0 red, -2px 0 map; }
      96% { opacity: 1; filter: hue-rotate(0deg); }
    }

    /* ── Action Matrix ── */
    .btn-wrap {
      padding: 18px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .inspect-btn {
      width: 100%;
      background: var(--primary);
      color: var(--bg);
      border: none;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 0 15px var(--primary-dim);
      transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .inspect-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px var(--primary), inset 0 0 8px rgba(255,255,255,0.3);
    }

    .inspect-btn:active {
      transform: translateY(0);
      filter: brightness(0.9);
    }

    .inspect-btn.active {
      background: var(--surf2);
      color: var(--error);
      box-shadow: 0 0 15px rgba(255, 113, 108, 0.2);
      border: 1px solid var(--error);
    }

    .panel-btn {
      width: 100%;
      background: var(--surf-low);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .2s;
    }

    .panel-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--surf);
      box-shadow: 0 0 10px rgba(58, 223, 250, 0.1);
    }

    .hint-row {
      padding: 0 18px 8px;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      display: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hint-row span {
      color: var(--primary);
    }

    /* ── Capability Matrix ── */
    .capabilities {
      margin: 12px 18px 24px;
      background: var(--surf-low);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cap-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .cap-icon {
      font-size: 14px;
      color: var(--primary);
      width: 20px;
      text-align: center;
    }

    .cap-label {
      font-weight: 500;
      color: var(--text);
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">🥷</div>
    <div class="brand">
      <div class="brand-name">LocatorLens</div>
      <div class="brand-sub">Tactical Observer v1.1.2</div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="btn-wrap">
    <button class="inspect-btn" id="inspectBtn">
      <span id="btnIcon">🎯</span>
      <span id="btnText">Start Inspecting</span>
    </button>
    <button class="panel-btn" id="panelBtn">
      <span>📋</span>
      <span id="panelBtnText">Open Results Panel</span>
    </button>
  </div>
  <div class="hint-row" id="hintRow">
    SELECT TARGET · <span>▲▼ ARROW TO NAVIGATE</span> · <span>ESC TO ABORT</span>
  </div>

  <div class="capabilities">
    <div class="cap-row">
      <span class="cap-icon">🎯</span>
      <div><span class="cap-label">Targeting Mode</span><br>Precision hover detection</div>
    </div>
    <div class="cap-row">
      <span class="cap-icon">⚡</span>
      <div><span class="cap-label">Auto-Copy</span><br>Instant clipboard sync</div>
    </div>
    <div class="cap-row">
      <span class="cap-icon">🛰️</span>
      <div><span class="cap-label">Cross-Browser</span><br>Optimized for store release</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
