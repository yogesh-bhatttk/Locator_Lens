<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>LocatorLens</title>
<style>
  :root {
    --bg:     #0a0e1a;
    --surf:   #111827;
    --surf2:  #1a2235;
    --border: #1e2d45;
    --green:  #00ff9d;
    --gdim:   #00c97a;
    --red:    #f87171;
    --text:   #e2e8f0;
    --muted:  #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 320px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    padding-bottom: 16px;
  }

  /* ── Header ── */
  .header {
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #00c97a, #00ff9d);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .brand { flex: 1; }
  .brand-name { font-weight: 700; font-size: 14px; }
  .brand-sub  { font-size: 10px; color: var(--muted); font-family: monospace; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background .3s;
  }
  .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Buttons ── */
  .btn-wrap { padding: 14px 16px 0; display: flex; flex-direction: column; gap: 8px; }

  .inspect-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gdim), var(--green));
    color: #0a0e1a; border: none; padding: 11px 16px;
    border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: all .2s;
  }
  .inspect-btn:hover { opacity: .9; transform: translateY(-1px); }
  .inspect-btn.active {
    background: var(--surf2);
    border: 1px solid var(--red);
    color: var(--red);
  }

  .panel-btn {
    width: 100%;
    background: var(--surf2);
    border: 1px solid var(--border);
    color: var(--text); padding: 9px 16px;
    border-radius: 10px; font-size: 12px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: all .2s;
  }
  .panel-btn:hover { border-color: var(--green); color: var(--green); }

  /* ── Hint row ── */
  .hint-row { padding: 6px 16px 4px; font-size: 11px; color: var(--muted); font-family: monospace; text-align: center; display: none; }
  .hint-row span { color: var(--green); }

  /* ── Feature list ── */
  .features { margin: 14px 16px 0; background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
  .feat-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); line-height: 1.7; }
  .feat-row span { font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🔍</div>
  <div class="brand">
    <div class="brand-name">LocatorLens</div>
    <div class="brand-sub">Playwright Element Inspector</div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="btn-wrap">
  <button class="inspect-btn" id="inspectBtn">
    <span id="btnIcon">🎯</span>
    <span id="btnText">Start Inspecting</span>
  </button>
  <button class="panel-btn" id="panelBtn">
    <span>📋</span>
    <span>Open Results Panel</span>
  </button>
</div>
<div class="hint-row" id="hintRow">
  Click any element · <span>▲▼ keys</span> to navigate · <span>Esc</span> to stop
</div>

<div class="features">
  <div class="feat-row"><span>🎯</span> Click Start to inspect any element</div>
  <div class="feat-row"><span>📋</span> Results appear in the Side Panel</div>
  <div class="feat-row"><span>✅</span> Best locator auto-copied on click</div>
  <div class="feat-row"><span>🖱️</span> Right-click any element for instant copy</div>
  <div class="feat-row"><span>🌲</span> Use ▲▼ keys to navigate parent/child</div>
</div>

<script src="popup.js"></script>
</body>
</html>
